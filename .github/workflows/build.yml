name: Build

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libzstd-dev \
            pkg-config \
            libsqlite3-dev \
            sqlite3

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package binary
        run: |
          mkdir -p dist
          archive="scribe-linux-${{ matrix.arch }}.tar.gz"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            archive="scribe-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.tar.gz"
          fi
          tar -czf "dist/${archive}" -C build scribe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: scribe-linux-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  windows-x64:
    name: windows x64
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        shell: pwsh
        run: vcpkg install sqlite3:x64-windows-static zstd:x64-windows-static

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DVCPKG_TARGET_TRIPLET=x64-windows-static
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Test
        continue-on-error: true
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $archive = "scribe-windows-x64.zip"
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $archive = "scribe-$env:GITHUB_REF_NAME-windows-x64.zip"
          }
          Compress-Archive `
            -Path build/RelWithDebInfo/scribe.exe `
            -DestinationPath "dist/$archive"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: scribe-windows-x64
          path: dist/*.zip
          if-no-files-found: error

  macos:
    name: macOS arm64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check architecture
        run: test "$(uname -m)" = arm64

      - name: Install dependencies
        run: brew install pkg-config zstd

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Package binary
        run: |
          mkdir -p dist
          archive="scribe-macos-arm64.tar.gz"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            archive="scribe-${GITHUB_REF_NAME}-macos-arm64.tar.gz"
          fi
          tar -czf "dist/${archive}" -C build scribe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: scribe-macos-arm64
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - windows-x64
      - macos
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: scribe-linux-x64
          path: dist

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: scribe-linux-arm64
          path: dist

      - name: Download Windows x64 binary
        uses: actions/download-artifact@v4
        with:
          name: scribe-windows-x64
          path: dist

      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: scribe-macos-arm64
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          draft: false
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
